<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lazy Loading Example for WDD 230">
    <title>Lazy Loading Example</title>
    <link rel="stylesheet" href="./styles/lazyload.css">
    <script src="./scripts/lazyload.js" defer></script>
</head>
<body>
    <h1>Lesson 7: Lazy Loading Example</h1>
    <picture>
        <img src="./images/placeholder.jpg" data-src='./images/chanelmodel.jpg' alt="Chanel Model" >
    </picture>
    <picture>
        <img src="./images/placeholder.jpg" data-src="./images/chanelfragrance.jpg" alt="Chanel Fragrance" >
    </picture>
    <picture>
        <img src="./images/placeholder.jpg" data-src="./images/cocochanel.jpeg" alt="Coco Chanel." >
    </picture>
    <picture>
        <img src="./images/placeholder.jpg" data-src="./images/n5chanel.webp" alt="A house in the forest" >
    </picture>
    <picture>
        <img src="./images/placeholder.jpg" data-src="./images/chanelcara.jpg" alt="Cara Delevingne in Chanel" >
    </picture>
</body>
</html>
