<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Example</title>
    <style>

        main{
            display: flex;
        }

        section{
            width: 50%;
            margin: 1rem;
            padding: 1rem;
            border: 1px solid black;
            min-width: 400px;
        }

        label{
            display: block;
            font-size: .75rem;
        }

        input{
            display: block;
            margin-bottom: .5rem;
            padding: .5rem;
        }

        textarea{
            display: block;
            margin-bottom: .5rem;
        }

        .myradio{
            display: inline;
            margin: 0px 5px 0px 0px;
        }

        .mysubmit{
            font-size: 1.5rem;
            background-color: pink;
            color: rgb(255, 255, 255);
            padding: .5rem;

        }

        @media(max-width: 800px){
            main {
                display: block;
            }
            
        }
    </style>
</head>
<body>
    <main>
        <section>
            <form method="GET" action="page2.html">
            <label>First name<input name="fname" type="text" value="" placeholder="Your first name" size="30" maxlength="30" required></label>
            <label>Last name<input name="fname" type="text" value="" placeholder="Your first name" size="30" maxlength="30" required></label>
            <p>Temperature</p>
            <label><input class="myradio" name="temp" type="radio" value="hot"> Hot</label>
            <label><input class="myradio" name="temp" type="radio" value="warm"> Warm</label>
            <label><input class="myradio" name="temp" type="radio" value="cold"> Cold</label>
            <label>Description: <textarea name="description" cols="40" rows="5"></textarea></label>
            <input class="mysubmit" type="submit" name="go" value="GO AND DO!">
        </form>
        </section>
        <section>
            random text
        </section>
    </main>
    
</body>
</html>
