<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Example</title>
    <style>
        caption{
            caption-side: bottom;
            font-size: .75rem;
        }

        thead{
            background-color: black;
            color: white;
        }

        .dark-grey{
            background-color: rgb(72, 72, 72);
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th colspan="4">ACME Wildwest Services</th>
            </tr>
            <tr>
                <th>&nbsp;</th>
                <th class="dark-grey">Basic</th>
                <th class="dark-grey">Premium</th>
                <th class="dark-grey">Deluxe</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Feature 1</td>
                <td>&check;</td>
                <td>&check;</td>
                <td>&check;</td>
            </tr>
            <tr>
                <td>Feature 1</td>
                <td>&#10006;</td>
                <td>&#10006;</td>
                <td>&check;</td>
            </tr>
        </tbody>
        <caption>
            Table 1: Account Feature Comparison
        </caption>
    </table>
</body>
</html>
